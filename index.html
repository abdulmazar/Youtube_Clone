<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube clone by @abdulmazar</title>
  <link rel="stylesheet" href="Styles/Horizontal-navbar.css">
  <link rel="stylesheet" href="Styles/verticle-nav.css">
  <link rel="stylesheet" href="Styles/general.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital@0;1&display=swap');
  </style>
</head>

<body>
  <div class="horizontal-nav">

    <div class="left-section">
      <img src="Images/Icons/hamburger.png" alt="ham" class="hamburger">
      <div class="yt-logo">
        <img src="Images/Icons/YouTube_logo.png" alt="" class="youtube-logo">
        <div class="trademark">
          <p>IN</p>
        </div>
      </div>
    </div>

    <div class="middle-section">

      <input class="Search-box" type="text" placeholder="Search">
      <button class="search-icon">
        <img src="Images/Icons/search.png" class="search-img">
      </button>

      <button class="voice">
        <img src="Images/Icons/voice-search.png" class="voice-img">
      </button>
    </div>

    <div class="right-section">
      <div class="create-btn">
        <img src="Images/Icons/plus.png" class="plus">
        <p>Create</p>
      </div>
      <div class="bell-icon">
        <img src="Images/Icons/bell.png" alt="" class="bell">
      </div>
      <div class="profile-pic">
        <img src="Images/avatar/Mazar.jpg" alt="" class="profile">
      </div>
    </div>
    <!-- Vertical Nav -->
     
    <div class="verticle-nav">
     
      <div>
        <img src="Images/Icons/home.png">
        <p>Home</p>
      </div>
      
      <div>
        <img src="Images/Icons/yt-shorts.png">
        <p>Shorts</p>
      </div>
      
      <div>
        <img src="Images/Icons/subscriptions.png">
        <p>Subscriptions</p>
      </div>
      
      <div>
        <img src="Images/Icons/user.png">
        <p>You</p>
      </div>


     </div>
</body>

</html>
